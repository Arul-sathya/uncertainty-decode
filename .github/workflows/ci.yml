name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install triton --extra-index-url https://pypi.org/simple/
        pip install -e ".[dev]" --no-deps
        pip install pytest numpy

    - name: Run CPU tests (no CUDA required)
      run: |
        pytest tests/test_integration.py -v -k "not TestTritonKernel" --tb=short

    - name: Check imports
      run: |
        python -c "
        from uncertainty_decode.eviction.uncertainty_head import DirichletEvidenceHead, UncertaintyConfig
        from uncertainty_decode.eviction.policy import UncertaintyEvictionPolicy
        from uncertainty_decode.eviction.block_scorer import BlockScorer
        print('All imports OK')
        "

    - name: Lint
      run: |
        pip install flake8
        flake8 uncertainty_decode/ --max-line-length=100 --ignore=E203,W503 --count
